<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pustaka Buku Fisik Interaktif</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts untuk nuansa buku fisik -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .font-serif-book {
      font-family: 'Playfair Display', Georgia, serif;
    }
    .font-header-book {
      font-family: 'Cinzel', serif;
    }
    /* Tekstur kertas halus */
    .paper-texture {
      background-image: radial-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 0), radial-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 0);
      background-size: 8px 8px;
      background-position: 0 0, 4px 4px;
    }
    /* Efek bayangan tumpukan kertas 3D di bawah buku */
    .book-shadow {
      box-shadow: 
        0 1px 1px rgba(0,0,0,0.1),
        0 10px 0 -5px #eee7d6,
        0 10px 1px -4px rgba(0,0,0,0.15),
        0 20px 0 -10px #e1d8c1,
        0 20px 1px -9px rgba(0,0,0,0.15),
        0 30px 0 -15px #d2c8ae,
        0 30px 1px -14px rgba(0,0,0,0.15),
        0 40px 30px -10px rgba(0, 0, 0, 0.5);
    }
    /* Animasi pergantian halaman halus */
    .page-fade {
      animation: fadeInPage 0.3s ease-in-out;
    }
    @keyframes fadeInPage {
      from { opacity: 0.6; transform: scale(0.99); }
      to { opacity: 1; transform: scale(1); }
    }
    /* Scrollbar tipis dan serasi untuk konten halaman yang panjang */
    .book-scroll {
      scrollbar-width: thin;
      scrollbar-color: rgba(30, 58, 138, 0.35) transparent;
    }
    .book-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .book-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .book-scroll::-webkit-scrollbar-thumb {
      background-color: rgba(30, 58, 138, 0.35);
      border-radius: 999px;
    }
    .book-scroll::-webkit-scrollbar-thumb:hover {
      background-color: rgba(30, 58, 138, 0.55);
    }
  </style>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen flex flex-col justify-between overflow-x-hidden">

  <!-- ================= HEADER BUKU ================= -->
  <header class="bg-stone-950 border-b border-stone-800 px-4 py-4 md:px-8 shadow-md">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3 mx-auto sm:mx-0">
        <div class="p-2 bg-blue-800 rounded-lg text-white shadow-inner">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"></path>
          </svg>
        </div>
        <div class="text-center sm:text-left">
          <h1 class="text-xl font-bold tracking-wider font-header-book text-blue-700">Pustaka Klasik</h1>
          <p class="text-xs text-stone-400">Sentuh bagian kiri halaman untuk mundur, bagian kanan untuk lanjut</p>
        </div>
      </div>

      <!-- Indikator Koneksi Cloud Supabase -->
      <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-stone-900 border border-stone-800 text-xs mx-auto sm:mx-0">
        <span id="conn-indicator" class="w-2.5 h-2.5 rounded-full bg-stone-600 animate-pulse"></span>
        <span id="conn-status" class="text-stone-400 font-semibold">Memeriksa Database Cloud...</span>
      </div>
    </div>
  </header>

  <!-- ================= CARI DATA BUKU ================= -->
  <main class="max-w-7xl mx-auto px-4 py-6 md:py-10 w-full flex-1 flex flex-col justify-center">
    
    <!-- Kolom Pencarian -->
    <div class="max-w-xl mx-auto w-full mb-8">
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-stone-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </span>
        <input 
          type="text" 
          id="search-input" 
          oninput="handleSearch()" 
          placeholder="Cari bab atau materi buku..." 
          class="w-full bg-stone-850/80 border border-stone-800 text-stone-100 placeholder-stone-500 pl-10 pr-4 py-2.5 rounded-xl focus:outline-none focus:border-blue-700 text-sm shadow-inner animate-pulse-disabled"
        />
        <button id="clear-search-btn" onclick="clearSearch()" class="absolute inset-y-0 right-0 flex items-center pr-4 text-stone-400 hover:text-stone-200 hidden">
          ✕
        </button>
      </div>
    </div>

    <!-- STRUKTUR BUKU TERBUKA (PORTRAIT 1-PAGE DECK) -->
    <div class="relative w-full max-w-xl mx-auto">
      
      <!-- Cover Luar Belakang Buku -->
      <div class="absolute -inset-1.5 bg-gradient-to-r from-blue-950 via-stone-900 to-blue-950 rounded-xl border border-blue-900/40 pointer-events-none"></div>

      <!-- LEMBARAN HALAMAN BUKU -->
      <div class="relative bg-[#faf6ee] paper-texture text-stone-900 rounded-lg min-h-[580px] flex flex-col justify-between overflow-hidden border border-blue-100/70 book-shadow">

        <!-- WATERMARK LOGO TRANSPARAN -->
        <img id="page-logo-watermark" class="hidden absolute inset-0 m-auto max-w-[55%] max-h-[55%] object-contain opacity-[0.07] pointer-events-none select-none z-0" alt="" />

        <!-- ZONA KLIK NAVIGASI TRANSPARAN (50% KIRI & 50% KANAN) -->
        <div class="absolute inset-0 flex z-30 pointer-events-none">
          <!-- Zona Kiri (Mundur) -->
          <div onclick="navPrev()" title="Klik bagian kiri untuk Halaman Sebelumnya" class="w-1/2 h-full cursor-w-resize pointer-events-auto group relative">
            <div class="absolute left-3 top-1/2 -translate-y-1/2 bg-stone-900/5 group-hover:bg-stone-900/10 p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-200">
              <svg class="w-5 h-5 text-stone-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"></path>
              </svg>
            </div>
          </div>
          <!-- Zona Kanan (Maju) -->
          <div onclick="navNext()" title="Klik bagian kanan untuk Halaman Berikutnya" class="w-1/2 h-full cursor-e-resize pointer-events-auto group relative">
            <div class="absolute right-3 top-1/2 -translate-y-1/2 bg-stone-900/5 group-hover:bg-stone-900/10 p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-200">
              <svg class="w-5 h-5 text-stone-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7"></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- AREA KONTEN MATERI UTAMA -->
        <div class="p-8 md:p-12 z-10 flex-1 flex flex-col justify-between relative pointer-events-none">
          
          <div id="page-container" class="page-fade max-h-[360px] md:max-h-[420px] overflow-y-auto pointer-events-auto pr-1 book-scroll relative z-40">
            <!-- Loading Spinner Sementara Saat Data Diambil -->
            <div class="flex flex-col items-center justify-center py-32 text-center">
              <svg class="animate-spin h-8 w-8 text-blue-800 mb-3" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <p class="font-serif-book italic text-stone-600 text-sm">Membuka pustaka buku...</p>
            </div>
          </div>

          <!-- Bagian Kaki Halaman Tunggal -->
          <div class="mt-8 pt-4 border-t border-stone-200/80 flex justify-between items-center text-[11px] font-bold tracking-wide text-stone-500">
            <span class="font-header-book text-[9px] uppercase">◀ Klik Kiri</span>
            <span id="page-number" class="italic">Halaman -</span>
            <span class="font-header-book text-[9px] uppercase">Klik Kanan ▶</span>
          </div>
          
        </div>

      </div>
    </div>

    <!-- STATUS MEMBACA YANG DISEDERHANAKAN -->
    <div class="text-center mt-8">
      <span id="book-progress-info" class="text-xs font-semibold text-stone-400 tracking-wider">
        Menghubungkan ke Supabase...
      </span>
    </div>

  </main>

  <!-- ================= FOOTER ================= -->
  <footer class="bg-stone-950 border-t border-stone-800 py-6 text-center text-xs text-stone-500">
    <div class="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-2">
      <p>© 2026 Pustaka Buku Fisik Klasik. Hak Cipta Terlindungi.</p>
      <p class="text-blue-700/60 font-medium">Model Cloud Supabase Terintegrasi</p>
    </div>
  </footer>

  <script>
    // ================= KONFIGURASI SUPABASE =================
    const SUPABASE_URL = "https://tjwvxqwpheqranrrdxjy.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqd3Z4cXdwaGVxcmFucnJkeGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTU5NzYsImV4cCI6MjA5ODQzMTk3Nn0.R9TtGc6X8bBbsz_EGJ-ZAUCIgQ7yIOwPx6-LFZmoNgE";
    const SUPABASE_TABLE_URL = `${SUPABASE_URL}/rest/v1/pages`;
    const SUPABASE_SETTINGS_URL = `${SUPABASE_URL}/rest/v1/settings`;
    const SUPABASE_HEADERS = {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json"
    };

    // Data Buku Default (Pre-seeded jika cloud belum di-setup)
    let defaultPages = [
      {
        id: "p1",
        pageNumber: 1,
        title: "Pustaka Klasik",
        content: "Daftar Isi:\n\nSelamat membaca! Konten buku ini tersimpan secara otomatis di database Supabase melalui Panel Admin.\n\nHalaman 1: Selamat Datang\nHalaman 2: Bab I — Asal Mula Dunia Digital\nHalaman 3: Bab II — Pilar Desain Antarmuka\n\nSilakan sentuh bagian kanan halaman ini untuk mulai membuka lembaran berikutnya."
      },
      {
        id: "p2",
        pageNumber: 2,
        title: "Bab I: Asal Mula Dunia Digital",
        content: "Di masa lampau, informasi tertulis hanya tersimpan pada lembaran daun dan kertas yang rapuh. Aksesnya pun sangat terbatas.\n\nNamun, revolusi teknologi mengubah segalanya. Dengan lahirnya jaringan internet, jutaan ilmu pengetahuan kini dapat diakses secara instan oleh siapa saja, di mana saja."
      },
      {
        id: "p3",
        pageNumber: 3,
        title: "Bab II: Pilar Desain Antarmuka",
        content: "Desain yang indah bukan hanya tentang warna yang mencolok, melainkan tentang kenyamanan pembaca (User Experience).\n\nAda tiga aturan emas dalam membangun halaman:\n1. Keseimbangan Ruang Kosong (Whitespace).\n2. Tipografi yang Sangat Mudah Dibaca.\n3. Skema Warna yang Selaras."
      }
    ];

    let pages = [...defaultPages];
    let currentPageIndex = 0;
    let searchQuery = "";

    // Konversi angka ke format Romawi (mendukung 1 - 3999)
    function toRoman(num) {
      if (!num || num < 1) return String(num);
      const map = [
        [1000, 'M'], [900, 'CM'], [500, 'D'], [400, 'CD'],
        [100, 'C'], [90, 'XC'], [50, 'L'], [40, 'XL'],
        [10, 'X'], [9, 'IX'], [5, 'V'], [4, 'IV'], [1, 'I']
      ];
      let result = '';
      let n = num;
      for (const [value, symbol] of map) {
        while (n >= value) {
          result += symbol;
          n -= value;
        }
      }
      return result;
    }

    function formatPageNumber(pageNumber, numberFormat) {
      return numberFormat === 'roman' ? toRoman(pageNumber) : String(pageNumber);
    }

    // Memuat Data dari Supabase
    async function fetchBookFromCloud() {
      const indicator = document.getElementById('conn-indicator');
      const statusText = document.getElementById('conn-status');

      indicator.className = "w-2.5 h-2.5 rounded-full bg-blue-700 animate-pulse";
      statusText.textContent = "Menghubungkan ke Supabase...";

      try {
        const response = await fetch(`${SUPABASE_TABLE_URL}?select=*&order=page_number.asc`, {
          method: "GET",
          headers: SUPABASE_HEADERS
        });
        if (!response.ok) throw new Error("Gagal mengambil data dari Supabase");

        const data = await response.json();
        if (Array.isArray(data) && data.length > 0) {
          pages = data.map(item => ({
            id: item.id,
            pageNumber: Number(item.page_number),
            title: item.title || 'Tanpa Judul',
            content: item.content || '',
            numberFormat: item.number_format || 'numeric'
          }));
          // Sinkronisasikan juga ke lokal sebagai cache cadangan (mode offline)
          localStorage.setItem('pustaka_klasik_pages', JSON.stringify(pages));

          indicator.className = "w-2.5 h-2.5 rounded-full bg-emerald-500";
          statusText.textContent = "Sinkron dengan Supabase";
        } else {
          indicator.className = "w-2.5 h-2.5 rounded-full bg-yellow-500";
          statusText.textContent = "Koneksi OK, Database Kosong";
          pages = [];
        }
      } catch (error) {
        console.error("Gagal mengambil data dari Supabase, menggunakan data lokal:", error);
        // Fallback ke data lokal jika koneksi internet terputus
        const localData = localStorage.getItem('pustaka_klasik_pages');
        if (localData) {
          try {
            pages = JSON.parse(localData);
          } catch (e) {
            pages = [...defaultPages];
          }
        }
        indicator.className = "w-2.5 h-2.5 rounded-full bg-red-500";
        statusText.textContent = "Koneksi Gagal (Memuat Cache Lokal)";
      }

      renderBook();
    }

    function getSortedPages() {
      return [...pages].sort((a, b) => Number(a.pageNumber) - Number(b.pageNumber));
    }

    function getFilteredPages() {
      const sorted = getSortedPages();
      if (!searchQuery.trim()) return sorted;
      
      return sorted.filter(p => 
        p.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
        p.content.toLowerCase().includes(searchQuery.toLowerCase()) ||
        p.pageNumber.toString() === searchQuery.trim()
      );
    }

    function renderBook() {
      const listHalaman = getFilteredPages();
      
      const container = document.getElementById('page-container');
      const pageNumSpan = document.getElementById('page-number');
      const progressSpan = document.getElementById('book-progress-info');

      if (currentPageIndex >= listHalaman.length) {
        currentPageIndex = Math.max(0, listHalaman.length - 1);
      }
      if (currentPageIndex < 0) {
        currentPageIndex = 0;
      }

      if (listHalaman.length === 0) {
        container.innerHTML = `
          <div class="py-20 text-center">
            <p class="font-serif-book italic text-stone-400">Tidak ada halaman yang cocok atau buku masih kosong.</p>
            <p class="text-xs text-stone-500 mt-2">Buka admin.html untuk mengisi buku.</p>
          </div>
        `;
        pageNumSpan.textContent = "-";
        progressSpan.textContent = "Buku Kosong";
        return;
      }

      const page = listHalaman[currentPageIndex];
      
      container.classList.remove('page-fade');
      void container.offsetWidth; // Trigger reflow
      container.classList.add('page-fade');

      container.innerHTML = `
        <h3 class="text-xl md:text-2xl font-serif-book font-bold text-blue-900 leading-tight mb-5 border-b border-stone-300/40 pb-2.5">
          ${page.title}
        </h3>
        <p class="text-stone-800 text-sm md:text-base leading-relaxed whitespace-pre-line font-serif">
          ${page.content}
        </p>
      `;
      pageNumSpan.textContent = formatPageNumber(page.pageNumber, page.numberFormat);

      const totalHal = listHalaman.length;
      progressSpan.textContent = `Halaman ${formatPageNumber(page.pageNumber, page.numberFormat)} dari ${totalHal} Hlm`;
    }

    function navPrev() {
      if (currentPageIndex > 0) {
        currentPageIndex -= 1;
        renderBook();
      }
    }

    function navNext() {
      const listHalaman = getFilteredPages();
      if (currentPageIndex < listHalaman.length - 1) {
        currentPageIndex += 1;
        renderBook();
      }
    }

    function handleSearch() {
      const sVal = document.getElementById('search-input').value;
      searchQuery = sVal;
      
      const clearBtn = document.getElementById('clear-search-btn');
      if (sVal) {
        clearBtn.classList.remove('hidden');
      } else {
        clearBtn.classList.add('hidden');
      }

      currentPageIndex = 0;
      renderBook();
    }

    function clearSearch() {
      document.getElementById('search-input').value = "";
      searchQuery = "";
      document.getElementById('clear-search-btn').classList.add('hidden');
      currentPageIndex = 0;
      renderBook();
    }

    // Memuat logo watermark dari Supabase (jika ada)
    async function fetchLogoWatermark() {
      try {
        const response = await fetch(`${SUPABASE_SETTINGS_URL}?select=value&key=eq.logo`, {
          method: "GET",
          headers: SUPABASE_HEADERS
        });
        if (!response.ok) throw new Error("Gagal mengambil logo");

        const data = await response.json();
        if (Array.isArray(data) && data.length > 0 && data[0].value) {
          const img = document.getElementById('page-logo-watermark');
          img.src = data[0].value;
          img.classList.remove('hidden');
        }
      } catch (error) {
        console.warn("Logo watermark tidak tersedia:", error);
      }
    }

    window.onload = function() {
      fetchBookFromCloud();
      fetchLogoWatermark();
    };
  </script>
</body>
</html>
